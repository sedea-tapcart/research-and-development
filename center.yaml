name: R&D
description: >-
  How developers deliver new features from idea to production — planning, implementation,
  PR shipping, deploy verification, and plan hygiene. Agents and Mission Control discover
  skills from `missions/<slug>/skills/**/SKILL.md` on disk; this manifest documents the
  center layout for audits and center-maintenance. Keep `skillEntries` in sync when adding skills.

# Paths below are relative to `.sedea/centers/research-and-development/` unless noted.

layout:
  rules: rules/
  docs: docs/
  missions: missions/

docs:
  - path: docs/development-process.md
    summary: Protocol branch catalogue, planning modes, hosting repo cadence; canonical PR sizing sync contract (§ PR sizing — test cases and kinds of changes). Squad dispatch contract lives in plan-and-deliver/plan.mdc.
  - path: docs/mission-control-display-metadata-host-spec.md
    summary: Pointer to hosting-repo Mission Control additive display fields, MCP tools, max lengths, and stale-tab recovery (authority in sedea rule 9).

rules:
  - path: rules/10_plan-naming-convention.mdc
  - path: rules/20_efficient-pr-shipping.mdc
  - path: rules/30_planning-target-resolution.mdc
  - path: rules/31_dispatch-scope.mdc
  - path: rules/40_maintain-rules.mdc
  - path: rules/50_mission-control-display-metadata-discipline.mdc

missions:
  - slug: plan-and-deliver
    plan: missions/plan-and-deliver/plan.mdc
    skills: missions/plan-and-deliver/skills/
    commands:
      - plan and deliver
    skillEntries:
      - missions/plan-and-deliver/skills/author-prd/SKILL.md
      - missions/plan-and-deliver/skills/brainstorm-research/SKILL.md
      - missions/plan-and-deliver/skills/ad-hoc-prd/SKILL.md
      - missions/plan-and-deliver/skills/coding-session/SKILL.md
      - missions/plan-and-deliver/skills/create-pr/SKILL.md
      - missions/plan-and-deliver/skills/delivery-phases/SKILL.md
      - missions/plan-and-deliver/skills/deploy-walk/SKILL.md
      - missions/plan-and-deliver/skills/hosting-repo-rules/SKILL.md
      - missions/plan-and-deliver/skills/master-planner/SKILL.md
      - missions/plan-and-deliver/skills/new-plan/SKILL.md
      - missions/plan-and-deliver/skills/phase-planner/SKILL.md
      - missions/plan-and-deliver/skills/plan-reconcile/SKILL.md
      - missions/plan-and-deliver/skills/pr-breakdown/SKILL.md
      - missions/plan-and-deliver/skills/pr-plan/SKILL.md
      - missions/plan-and-deliver/skills/pr-review/SKILL.md
      - missions/plan-and-deliver/skills/pre-pr-review/SKILL.md
      - missions/plan-and-deliver/skills/worktree-bootstrap/SKILL.md
  - slug: debug-and-fix
    plan: missions/debug-and-fix/plan.mdc
    skills: missions/debug-and-fix/skills/
    commands:
      - debug and fix
    skillEntries:
      - missions/debug-and-fix/skills/debug-and-fix/SKILL.md
      - missions/plan-and-deliver/skills/brainstorm-research/SKILL.md
  # Reuses plan-and-deliver SKILL.md paths (no mission-local copies except spawn targets).
  - slug: single-phase
    plan: missions/single-phase/plan.mdc
    skills: missions/single-phase/skills/
    commands:
      - plan and deliver a single phase
    skillEntries:
      - missions/plan-and-deliver/skills/ad-hoc-prd/SKILL.md
      - missions/plan-and-deliver/skills/brainstorm-research/SKILL.md
      - missions/plan-and-deliver/skills/coding-session/SKILL.md
      - missions/plan-and-deliver/skills/new-plan/SKILL.md
      - missions/plan-and-deliver/skills/master-planner/SKILL.md
      - missions/plan-and-deliver/skills/pr-breakdown/SKILL.md
      - missions/plan-and-deliver/skills/pr-plan/SKILL.md
      - missions/plan-and-deliver/skills/pre-pr-review/SKILL.md
  - slug: quick-fix
    plan: missions/quick-fix/plan.mdc
    skills: missions/quick-fix/skills/
    commands:
      - quick fix
    skillEntries:
      - missions/quick-fix/skills/quick-fix-plan-agent/SKILL.md
      - missions/quick-fix/skills/quick-fix-plan/SKILL.md
      - missions/plan-and-deliver/skills/brainstorm-research/SKILL.md
      - missions/plan-and-deliver/skills/coding-session/SKILL.md
      - missions/plan-and-deliver/skills/new-plan/SKILL.md
      - missions/plan-and-deliver/skills/pr-plan/SKILL.md
      - missions/plan-and-deliver/skills/pre-pr-review/SKILL.md

centerSkills:
  readme: missions/plan-and-deliver/skills/README.md
  note: Spawn contracts and normative terminal stop for plan-and-deliver; not a runnable skill.

manifest:
  verify: missions/plan-and-deliver/scripts/verify-skill-manifest.mjs
  parityVerify: missions/plan-and-deliver/scripts/verify-lane-warmup-parity.mjs
  parityGateBootstrap: slim
  sync: >-
    After adding or removing any `missions/<slug>/skills/*/SKILL.md`, update this file's
    `skillEntries` for that mission and run the verify script from the hosting repo root
    (see development-process.md § Center and mission governance).

governance:
  missionScopedRules: false
  note: >-
    Intentionally no `missions/<slug>/rules/*.mdc` packs. Center rules plus each
    mission `plan.mdc` and skill `SKILL.md` files are the source of truth.
  hostSync:
    mission: plan-and-deliver
    summary: >-
      Section 8 ship ledger is automation-only: host sync from spawned ship child
      terminals (coding-session, pre-pr-review) and coding-session re-emits for inline
      milestones. No manual Ship recap paste path. Missing outputs are mission gaps —
      see plan.mdc §8 automation completeness.
    agentDocs:
      - missions/plan-and-deliver/plan.mdc
      - docs/development-process.md
    extensionDoc: >-
      Hosting repo ship-ledger host contract (paths in that repo's `.cursor/rules/dot-sedea.mdc`
      or Mission Control host docs): ship-ledger.v1.json, silent leader host-sync message,
      required child outputs, audit events.
    requiredChildOutputs:
      - targetPlanPath
      - shipPhase
      - rowStatus
    shipSkills:
      - coding-session
      - pre-pr-review
