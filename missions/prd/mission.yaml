name: PRD
description: >-
  Documentation-role mission for creating and maintaining Product or Feature
  Requirements Documents from source materials, notes, links, and iterative
  review; use this mission when centers, rules, or missions refer to an existing
  documentation mission.
commands:
  - phrase: create prd
    description: Create a new Product or Feature Requirements Document from provided source material.
  - phrase: manage prd
    description: Review or update an existing Product or Feature Requirements Document.
