name: Debug and Fix
description: >-
  Log-first debug loop in a dedicated worktree; after verified fix, code
  promotion runs Ad-Hoc PRD then coding-session, or findings report only
  without promotion.
commands:
  - phrase: debug and fix
    default: true
    description: >-
      Diagnose and fix an issue — logs first; after verified fix, promote via
      Ad-Hoc PRD and coding-session, or deliver a findings report only.
